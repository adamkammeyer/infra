- name: Update system
  dnf:
    name: "*"
    state: latest
  become: yes
  tags:
    - system

- name: Ensure flathub flatpak repository is removed for the user
  community.general.flatpak_remote:
    name: flathub
    state: absent
    method: user
  tags:
    - flatpak
    - system

- name: Ensure flathub flatpak repository is removed for the system
  community.general.flatpak_remote:
    name: flathub
    state: absent
    method: system
  become: yes
  tags:
    - flatpak
    - system

- name: Add the flathub flatpak repository remote to the user installation
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
  become: yes
  tags:
    - flatpak
    - system

- name: Ensure the flathub repository is enabled
  become: yes
  command: flatpak remote-modify --enable flathub
  tags:
    - flatpak
    - system

- name: Customize GNOME Desktop
  include_tasks: tasks/system/gnome.yml
  tags:
    - gnome

- name: Check if Nextcloud Documents directory exists
  stat:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Nextcloud/Documents"
  register: result
  tags:
    - directories

- name: Create Nextcloud Documents if it doesn't exist
  file:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Nextcloud/Documents"
    state: directory
    owner: "{{ ansible_facts['env']['USER'] }}"
    group: "{{ ansible_facts['env']['USER'] }}"
    mode: 0775
  when: result.stat.exists == false
  tags:
    - directories

- name: Remove Documents directory from Home
  file:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Documents"
    state: absent
  register: removal
  tags:
    - directories

- name: Create Documents symlink in Home
  file:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Documents"
    state: link
    src: "/home/{{ ansible_facts['env']['USER'] }}/Nextcloud/Documents"
  become: yes
  tags:
    - directories

- name: Check if Nextcloud Photos directory exists
  stat:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Nextcloud/Photos"
  register: result
  tags:
    - directories

- name: Create Nextcloud Photos if it doesn't exist
  file:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Nextcloud/Photos"
    state: directory
    owner: "{{ ansible_facts['env']['USER'] }}"
    group: "{{ ansible_facts['env']['USER'] }}"
    mode: 0775
  when: result.stat.exists == false
  tags:
    - directories

- name: Remove Pictures directory from Home
  file:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Pictures"
    state: absent
  register: removal
  tags:
    - directories

- name: Create Pictures symlink in Home
  file:
    path: "/home/{{ ansible_facts['env']['USER'] }}/Pictures"
    state: link
    src: "/home/{{ ansible_facts['env']['USER'] }}/Nextcloud/Photos"
  become: yes
  tags:
    - directories
  
- name: Create Apps directory if necessary
  file:
    path: /home/{{ ansible_facts['env']['USER'] }}/Apps
    state: directory
    mode: '0755'
  tags:
    - directories





